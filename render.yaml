services:
  - type: web
    name: resumepro
    env: node
    plan: free
    buildCommand: npm install && npm run build:client
    startCommand: npx tsx server/node-build.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
